<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Dataset</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icons/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dataset-page">
    <div class="image-background"></div>

    <!-- Header Logo -->
    <a href="{{ url_for('menu') }}" class="header-logo-link" style="text-decoration: none; color: inherit;">
        <div class="header-logo">
            <div class="header-logo-image">
                <img src="{{ url_for('static', filename='icons/logo.png') }}" alt="MarkLogic Logo">
            </div>
            <div class="header-brand">
                <div class="header-brand-name">MarkLogic</div>
                <div class="header-slogan">Stop Searching. Start Finding</div>
            </div>
        </div>
    </a>

    <div class="dataset-main-container">
        <h1 class="dataset-page-title">Client Dataset</h1>
        
        <div class="dataset-tab-container">
            <button class="dataset-tab-btn active" data-tab="upload">Upload</button>
            <button class="dataset-tab-btn" data-tab="manage">Manage</button>
        </div>

        <div class="dataset-content-box">
            <div class="dataset-tab-content">
                <!-- Upload Tab -->
                <div class="dataset-tab-panel active" id="upload-panel">
                    <div class="dataset-form-row">
                        <div class="dataset-form-field">
                            <label class="dataset-form-label">File Name / Reference</label>
                            <input type="text" id="fileName" class="dataset-form-input" placeholder="e.g. Client_Project_Alpha">
                        </div>
                        <div class="dataset-form-field">
                            <label class="dataset-form-label">Date <span style="color: #e74c3c;">*</span></label>
                            <input type="date" id="fileDate" class="dataset-form-input" required>
                        </div>
                    </div>

                    <!-- Upload Area -->
                    <div class="dataset-upload-area" id="uploadArea">
                        <input type="file" id="fileInput" class="dataset-file-input" accept=".jpeg,.jpg,.png,.webp,.pdf">

                        <!-- Default idle state -->
                        <div id="uploadIdleState">
                            <div class="dataset-upload-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M7 18a4.6 4.4 0 0 1 0 -9a5 4.5 0 0 1 11 2h1a3.5 3.5 0 0 1 0 7h-1" />
                                    <polyline points="9 15 12 12 15 15" />
                                    <path d="M12 12v9" />
                                </svg>
                            </div>
                            <div class="dataset-upload-text">
                                Drag & drop or <span class="browse">Browse</span>
                            </div>
                            <div style="font-size:0.78rem; color:rgba(255,255,255,0.45); margin-top:6px;">
                                Supports: JPG, PNG, WEBP &nbsp;·&nbsp; PDF (multi-trademark journals)
                            </div>
                        </div>

                        <!-- Preview state (shown after file selected) -->
                        <div id="uploadPreviewState" style="display:none; width:100%; text-align:center;">
                            <!-- Image preview -->
                            <div id="imagePreviewWrap" style="display:none;">
                                <img id="imagePreview" style="max-height:130px; max-width:90%; border-radius:8px; object-fit:contain;">
                            </div>
                            <!-- PDF preview -->
                            <div id="pdfPreviewWrap" style="display:none;">
                                <div style="font-size:3.5rem; line-height:1;">📄</div>
                            </div>
                            <div id="previewFileName" style="margin-top:8px; font-size:0.88rem; color:rgba(255,255,255,0.85); word-break:break-all;"></div>
                            <div id="previewFileType" style="margin-top:3px; font-size:0.75rem; color:rgba(255,255,255,0.45);"></div>
                            <button onclick="clearFileSelection(event)"
                                    style="margin-top:10px; background:rgba(255,255,255,0.12); border:none; border-radius:6px;
                                           color:#fff; padding:4px 14px; cursor:pointer; font-size:0.8rem;">
                                ✕ Remove
                            </button>
                        </div>
                    </div>

                    <!-- Progress (two-phase: extraction + saving) -->
                    <div id="progressContainer" style="display:none; margin-top:20px;">
                        <!-- Phase label -->
                        <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                            <span id="progressPhase"  style="font-size:0.78rem; color:rgba(255,255,255,0.55); font-weight:600; text-transform:uppercase; letter-spacing:.05em;">Phase 1 of 2 — Extracting</span>
                            <span id="progressPercent" style="font-size:0.9rem; color:#fff; font-weight:bold;">0%</span>
                        </div>
                        <!-- Detail text -->
                        <div id="progressText" style="font-size:0.88rem; color:rgba(255,255,255,0.8); margin-bottom:8px;">Initializing…</div>
                        <!-- Bar -->
                        <div style="width:100%; height:8px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden;">
                            <div id="progressBar" style="width:0%; height:100%; background:linear-gradient(90deg,#4cc9f0,#6458f0); transition:width 0.3s ease;"></div>
                        </div>
                        <!-- Record counter (shown during save phase) -->
                        <div id="progressCounter" style="display:none; margin-top:6px; font-size:0.78rem; color:rgba(255,255,255,0.5); text-align:right;"></div>
                    </div>

                    <center>
                        <button class="dataset-upload-button" id="uploadBtn" disabled style="margin-top:20px;">
                            Upload to Client Dataset
                        </button>
                    </center>
                </div>

                <!-- Manage Tab -->
                <div class="dataset-tab-panel" id="manage-panel">
                    <div class="manage-search-section">
                        <div class="dataset-form-row">
                            <div class="dataset-form-field">
                                <label class="dataset-form-label">Search Client Records</label>
                                <input type="text" id="searchClientName" class="dataset-form-input" placeholder="Search by name...">
                            </div>
                            <button class="manage-search-btn" id="btnSearchClient">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
                            </button>
                        </div>
                        <div class="manage-action-row">
                            <button class="manage-reset-btn" id="resetClientSearch">Reset</button>
                            <button class="manage-delete-btn" id="deleteClientBtn">Delete Selected</button>
                        </div>
                    </div>

                    <div class="manage-table-container">
                        <table class="manage-table">
                            <thead>
                                <tr>
                                    <th class="table-checkbox-col"><input type="checkbox" id="selectAll"></th>
                                    <th>File Name</th>
                                    <th>Description</th>
                                    <th>Upload Date</th>
                                </tr>
                            </thead>
                            <tbody id="clientTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='client-dataset.js') }}"></script>
</body>
</html>
